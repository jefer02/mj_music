<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MJ Music</title>
    <meta name="description" content="MJ Music — Reproductor local y YouTube con biblioteca personalizada" />
    <meta name="theme-color" content="#0e1722" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap");

      *, *::before, *::after { box-sizing: border-box; }

      html, body { margin: 0; padding: 0; min-height: 100%; }

      body {
        font-family: "Manrope", system-ui, sans-serif;
        background: #0e1722;
        color: #ecf1f7;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #0e1722 0%, #111d2a 60%, #1a1c2a 100%);
        transition: opacity 0.4s ease, visibility 0.4s ease;
        opacity: 1;
        visibility: visible;
      }

      body.app-ready #app-loader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: loaderFadeIn 0.5s ease both;
      }

      @keyframes loaderFadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .loader-icon-wrap {
        position: relative;
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loader-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #ff8a5a;
        animation: loaderSpin 0.9s linear infinite;
      }

      .loader-ring-2 {
        inset: 8px;
        border-top-color: rgba(255,138,90,0.4);
        animation-duration: 1.4s;
        animation-direction: reverse;
      }

      .loader-note {
        font-size: 26px;
        line-height: 1;
      }

      @keyframes loaderSpin {
        to { transform: rotate(360deg); }
      }

      .loader-text {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .loader-title {
        font-size: 1.15rem;
        font-weight: 700;
        color: #ecf1f7;
        letter-spacing: 0.01em;
      }

      .loader-sub {
        font-size: 0.82rem;
        color: #6b7a8d;
        letter-spacing: 0.02em;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BXu9_LJ1.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B536ZL59.css">
  </head>

  <body data-theme="dark" class="app-loading">
    <div id="app-loader" role="status" aria-label="Loading MJ Music">
      <div class="loader-inner">
        <div class="loader-icon-wrap">
          <div class="loader-ring"></div>
          <div class="loader-ring loader-ring-2"></div>
          <span class="loader-note" aria-hidden="true">♫</span>
        </div>
        <div class="loader-text">
          <span class="loader-title">MJ Music</span>
          <span class="loader-sub">Starting up…</span>
        </div>
      </div>
    </div>

    <div id="root"></div>
  </body>
</html>
