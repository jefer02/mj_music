<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MJ Music</title>
    <meta name="description" content="Reproductor de musica MJ Music" />

    <style>
      body.app-loading {
        margin: 0;
        background: #10171d;
      }

      body.app-loading > :not(#app-loader):not(script) {
        visibility: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #10171d;
        color: #f0f4f8;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.32s ease, visibility 0.32s ease;
      }

      .app-loader-content {
        display: grid;
        justify-items: center;
        gap: 0.8rem;
        font-family: "Manrope", sans-serif;
      }

      .app-loader-spinner {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.26);
        border-top-color: #ff8b47;
        animation: appLoaderSpin 0.9s linear infinite;
      }

      .app-loader-text {
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      body.app-ready #app-loader {
        opacity: 0;
        visibility: hidden;
      }

      @keyframes appLoaderSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-Cb5ZG_0j.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CCtMNh01.css">
  </head>
  <body data-theme="light" class="app-loading">
    <div id="app-loader" aria-live="polite" role="status">
      <div class="app-loader-content">
        <div class="app-loader-spinner" aria-hidden="true"></div>
        <p class="app-loader-text">Cargando...</p>
      </div>
    </div>

    <div class="bg-shape bg-shape-left" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-right" aria-hidden="true"></div>

    <div class="app-wrapper">
      <header class="app-header">
        <div class="brand-area">
          <img src="/assets/logo-secondary-6blvQyRs.png" alt="Logo secundario MJ Music" class="logo-secondary" />

          <div class="brand-copy">
            <h1>MJ Music</h1>
          </div>
        </div>

        <button id="btn-theme-toggle" class="btn-theme" type="button" aria-label="Cambiar entre modo claro y oscuro">
          Modo oscuro
        </button>
      </header>

      <section class="player-section" aria-label="Reproductor">
        <div class="now-playing">
          <div class="album-art" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="3"></circle>
              <line x1="12" y1="2" x2="12" y2="9"></line>
            </svg>
          </div>
          <div class="song-meta">
            <span id="current-title">Sin cancion seleccionada</span>
            <span id="current-artist">-</span>
          </div>
        </div>

        <div class="progress-container" aria-label="Progreso de reproduccion">
          <span class="time-label" id="current-time">00:00</span>
          <div class="progress-track">
            <div id="progress-fill"></div>
            <input type="range" id="progress-bar" min="0" max="100" step="0.1" value="0" aria-label="Posicion de reproduccion" />
          </div>
          <span class="time-label" id="total-time">--:--</span>
        </div>

        <div class="player-controls">
          <button class="btn-control" id="btn-prev" type="button" aria-label="Cancion anterior" title="Anterior">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="19,20 9,12 19,4"></polygon>
              <rect x="5" y="4" width="2" height="16"></rect>
            </svg>
          </button>

          <button id="btn-play" type="button" aria-label="Reproducir o pausar" title="Reproducir">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,3 19,12 5,21"></polygon>
            </svg>
          </button>

          <button class="btn-control" id="btn-next" type="button" aria-label="Siguiente cancion" title="Siguiente">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,4 15,12 5,20"></polygon>
              <rect x="17" y="4" width="2" height="16"></rect>
            </svg>
          </button>
        </div>

        <div class="volume-section">
          <label for="volume-slider">Volumen</label>
          <input type="range" id="volume-slider" min="0" max="100" value="80" aria-label="Volumen" />
        </div>
      </section>

      <main class="content-grid">
        <aside class="panel playlists-panel" aria-label="Listas de reproduccion">
          <div class="panel-header">
            <h2 class="panel-title">Listas</h2>
          </div>

          <ul class="playlists-list" id="playlists-list" role="listbox" aria-label="Listas de reproduccion"></ul>

          <div class="playlist-builder">
            <h3>Crear lista con canciones existentes</h3>

            <input
              type="text"
              id="playlist-name-input"
              class="input-field"
              placeholder="Nombre de la playlist"
              maxlength="40"
              aria-label="Nombre de la playlist"
            />

            <div class="selector-actions">
              <button id="btn-select-all-songs" class="btn-soft" type="button">Seleccionar todo</button>
              <button id="btn-clear-song-selection" class="btn-soft" type="button">Limpiar</button>
            </div>

            <div id="playlist-song-selector" class="playlist-song-selector" aria-label="Selector de canciones"></div>

            <div class="builder-actions">
              <button id="btn-create-playlist" class="btn-primary" type="button">Crear playlist</button>
              <button id="btn-add-selected-to-active" class="btn-soft" type="button">Agregar seleccion a lista activa</button>
            </div>

            <p id="playlist-rule-msg" class="rule-message">Primero carga canciones para habilitar la creacion de playlists.</p>
          </div>
        </aside>

        <section class="panel songs-panel" aria-label="Canciones">
          <div class="songs-panel-header">
            <div class="songs-panel-title-row">
              <h2 class="active-playlist-label" id="active-playlist-name">Biblioteca general</h2>
              <span class="panel-badge" id="song-count">0 canciones</span>
            </div>

            <div class="song-controls">
              <button class="btn-load-main" id="btn-load" type="button" aria-label="Cargar canciones desde el dispositivo">
                Cargar canciones
              </button>
              <input type="file" id="file-input" accept="audio/*" multiple hidden aria-label="Seleccionar archivos de audio" />
            </div>
          </div>

          <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Zona para arrastrar y soltar canciones">
            Arrastra y suelta varias canciones aqui o haz clic para seleccionarlas
          </div>

          <ul class="song-list" id="song-list" role="listbox" aria-label="Lista de canciones"></ul>
        </section>
      </main>
    </div>

    <div class="notification" id="notification" role="status" aria-live="polite"></div>

  </body>
</html>
